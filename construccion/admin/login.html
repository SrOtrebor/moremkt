<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MoreMKT</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="../../SVG/iso.svg" type="image/svg+xml">
</head>

<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="../../SVG/logo-amari.svg" alt="MoreMKT Logo"
                    style="max-width: 200px; margin-bottom: 16px;">
                <p>Panel de Administración</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                        placeholder="tu-email@gmail.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        placeholder="••••••••">
                </div>

                <div id="error-message" class="error-message" style="display: none;"></div>

                <button type="submit" id="btn-login" class="btn-primary">
                    Iniciar Sesión
                </button>
            </form>

            <div class="login-footer">
                <a href="../index.html">← Volver al sitio</a>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
