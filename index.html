<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MoreMKT - Estrategia & Performance. Próximamente.">
    <title>MoreMKT | Próximamente</title>
    <!-- Favicon -->
    <link rel="icon" href="SVG/iso.svg" type="image/svg+xml">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons para iconos modernos y minimalistas -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- Esquinas decorativas animadas al estilo de la referencia -->
    <div class="corner-decor top-left"></div>
    <div class="corner-decor top-right"></div>
    <div class="corner-decor bottom-left"></div>
    <div class="corner-decor bottom-right"></div>

    <main class="container">
        <!-- Logo -->
        <div class="brand-container">
            <img src="SVG/logo-amari.svg" alt="MoreMKT Logo" class="logo">
        </div>
        
        <!-- Contenido principal -->
        <div class="content">
            <h1 class="title">Próximamente</h1>
            <p class="subtitle">Estrategia de Paid Media con enfoque en resultados. Estamos preparando nuestro nuevo sitio web para potenciar tu negocio.</p>
            <div class="divider"></div>
            <a href="reserva.html" style="margin-top: 10px; padding: 12px 24px; background: var(--accent-color); color: var(--bg-color-edge); font-weight: 600; text-decoration: none; border-radius: 8px; font-family: var(--font-heading); transition: transform 0.3s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">Reserva tu Cita</a>
        </div>

        <!-- Contactos -->
        <div class="contact">
            <a href="https://wa.me/5491176426155" target="_blank" rel="noopener noreferrer" class="contact-link">
                <div class="icon-wrapper whatsapp">
                    <i class="ph ph-whatsapp-logo"></i>
                </div>
                <span class="link-text">
                    <span class="label">Hablemos por WhatsApp</span>
                    <span class="value">11 7642-6155</span>
                </span>
            </a>
            
            <a href="mailto:hola@morehdmkt.com" class="contact-link">
                <div class="icon-wrapper email">
                    <i class="ph ph-envelope-simple"></i>
                </div>
                <span class="link-text">
                    <span class="label">Envíanos un correo</span>
                    <span class="value">hola@morehdmkt.com</span>
                </span>
            </a>
        </div>
    </main>

    <!-- Partículas decorativas sutiles en el fondo -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
</body>
</html>
